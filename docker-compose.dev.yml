services:
  backend:
    command: ["python", "-m", "uvicorn", "backend.app.main:create_app", "--factory", "--reload", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./backend:/app/backend
      - ./shared:/app/shared
      - ${BACKEND_DATA_DIR:-./backend/data}:/app/backend/data
      - ${BACKEND_STORAGE_DIR:-./backend/storage}:/app/backend/storage

  frontend:
    build:
      target: dev
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - /app/frontend/node_modules
