# MANIFEST.yaml — Canonical → Router Derivation Map
#
# Maps canonical documentation (source of truth) to derived router mini-files.
# Run: python scripts/docs/generate-router-files.py
# CI:  python scripts/docs/generate-router-files.py --check
#
# Entry types:
#   content  — extract named sections from a canonical doc
#   index    — auto-generate directory listing of sibling entries
#   reference — generate a pointer to a canonical doc (no content extraction)
#
# Section matching: heading text after ## or ### prefix, case-sensitive.

outputs:

  # ═══════════════════════════════════════════════════════════════
  # 03_SHARED/00_entry.md — top-level index of shared module groups
  # ═══════════════════════════════════════════════════════════════
  - target: docs/agent_router/03_SHARED/00_entry.md
    type: index
    title: "Shared Docs (Modules)"
    description: "Split, token-optimized versions of `docs/shared/*`."
    subdirectories:
      - name: CODING_STANDARDS
        entry: docs/agent_router/03_SHARED/CODING_STANDARDS/00_entry.md
      - name: DOCUMENTATION_GUIDELINES
        entry: docs/agent_router/03_SHARED/DOCUMENTATION_GUIDELINES/00_entry.md
      - name: WAY_OF_WORKING
        entry: docs/agent_router/03_SHARED/WAY_OF_WORKING/00_entry.md
      - name: UX_GUIDELINES
        entry: docs/agent_router/03_SHARED/UX_GUIDELINES/00_entry.md
      - name: BRAND_GUIDELINES
        entry: docs/agent_router/03_SHARED/BRAND_GUIDELINES/00_entry.md

